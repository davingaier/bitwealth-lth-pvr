<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account - BitWealth</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--bg-dark);
        }
        
        .register-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 100%;
            padding: 48px;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .register-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .register-header p {
            color: var(--text-secondary);
        }
        
        .password-requirements {
            background: rgba(255, 180, 0, 0.1);
            border: 1px solid rgba(255, 180, 0, 0.2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .password-requirements ul {
            margin: 8px 0 0 20px;
            padding: 0;
        }
        
        .password-requirements li {
            margin: 4px 0;
        }
        
        .checkbox-group {
            margin: 20px 0;
        }
        
        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
        }
        
        .checkbox-label input[type="checkbox"] {
            margin-top: 2px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        .checkbox-label a {
            color: var(--gold);
            text-decoration: none;
        }
        
        .checkbox-label a:hover {
            text-decoration: underline;
        }
        
        .btn-register {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 24px;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            color: var(--gold);
        }

        /* Password reveal toggle */
        .pw-toggle {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            background: none;
            border: none;
            border-radius: 6px;
            color: #6b7280;
            cursor: pointer;
            transition: color 0.15s ease, background 0.15s ease;
        }
        .pw-toggle:hover { color: #032C48; background: #f3f4f6; }
        .pw-toggle:focus-visible { outline: 2px solid var(--gold, #C9A04A); outline-offset: 1px; }
        .pw-toggle svg { display: block; }

        /* ───── Legal modal ───── */
        .legal-modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .legal-modal-backdrop.open { display: flex; }
        .legal-modal {
            background: #fff;
            color: #1f2937;
            width: 100%; max-width: 880px;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .legal-modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
            flex-shrink: 0;
        }
        .legal-modal-title { font-size: 14px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
        .legal-modal-close {
            background: none; border: none; cursor: pointer;
            font-size: 24px; line-height: 1; color: #6b7280;
            padding: 4px 10px; border-radius: 6px;
        }
        .legal-modal-close:hover { background: #e5e7eb; color: #1f2937; }
        .legal-modal-body {
            overflow-y: auto;
            padding: 24px 32px;
            flex: 1 1 auto;
        }
        .legal-modal-footer {
            padding: 12px 20px;
            border-top: 1px solid #e5e7eb;
            display: flex; justify-content: flex-end; gap: 10px;
            background: #f9fafb;
            flex-shrink: 0;
        }
        .legal-modal-footer button {
            padding: 8px 18px; border-radius: 6px;
            border: 1px solid #d1d5db;
            background: #fff; cursor: pointer;
            font-size: 14px; font-weight: 500;
        }
        .legal-modal-footer button.primary {
            background: var(--gold); border-color: var(--gold); color: #032c48;
        }
        .legal-modal-loading { text-align: center; color: #6b7280; padding: 40px 0; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>Create Your Account</h1>
                <p>Complete your registration to access the BitWealth customer portal</p>
            </div>
            
            <form id="registerForm">
                <input type="hidden" id="customerId" name="customerId">
                <input type="hidden" id="email" name="email">
                
                <div class="form-group">
                    <label for="displayEmail">Email Address</label>
                    <input type="email" id="displayEmail" disabled>
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" required style="padding-right: 40px;">
                        <button type="button" onclick="togglePassword('password', this)" class="pw-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmPassword" name="confirmPassword" required style="padding-right: 40px;">
                        <button type="button" onclick="togglePassword('confirmPassword', this)" class="pw-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                
                <div class="password-requirements">
                    <strong>Password Requirements:</strong>
                    <ul>
                        <li>Minimum 8 characters</li>
                        <li>At least 1 uppercase letter</li>
                        <li>At least 1 number</li>
                        <li>At least 1 special character (@, $, !, %, *, ?, &, #)</li>
                    </ul>
                </div>
                
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="acceptTerms" name="acceptTerms" required>
                        <span>I accept the <a href="legal/terms-of-service.html" data-legal="terms-of-service" target="_blank" rel="noopener">Terms of Service</a></span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="acceptPrivacy" name="acceptPrivacy" required>
                        <span>I accept the <a href="legal/privacy-policy.html" data-legal="privacy-policy" target="_blank" rel="noopener">Privacy Policy</a></span>
                    </label>
                    
                    <label class="checkbox-label">
                        <input type="checkbox" id="signDisclaimer" name="signDisclaimer" required>
                        <span>I have read and understood the <a href="legal/investment-disclaimer.html" data-legal="investment-disclaimer" target="_blank" rel="noopener">Investment Disclaimer</a></span>
                    </label>
                </div>
                
                <div id="formMessage" class="form-message"></div>
                
                <button type="submit" class="btn-primary btn-register" id="submitBtn">
                    Create Account
                </button>
            </form>
            
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </div>

    <!-- Legal document modal -->
    <link rel="stylesheet" href="legal/_legal.css">
    <div class="legal-modal-backdrop" id="legalModal" role="dialog" aria-modal="true" aria-labelledby="legalModalTitle">
        <div class="legal-modal">
            <div class="legal-modal-header">
                <span class="legal-modal-title" id="legalModalTitle">Document</span>
                <button type="button" class="legal-modal-close" aria-label="Close" onclick="closeLegalModal()">&times;</button>
            </div>
            <div class="legal-modal-body" id="legalModalBody">
                <div class="legal-modal-loading">Loading…</div>
            </div>
            <div class="legal-modal-footer">
                <button type="button" class="primary" onclick="closeLegalModal()">Close</button>
            </div>
        </div>
    </div>
    
    <script>
        // ───── Legal modal ─────────────────────────────────────────────
        // Intercept clicks on links carrying data-legal="<slug>" and open the
        // matching legal page (under /legal/) inside an in-page modal so the
        // registration form state is preserved. The same pages remain reachable
        // via direct URL (or a middle-click / right-click → open in new tab),
        // so SEO and shareability are unaffected.
        const __legalCache = new Map();
        async function openLegalModal(slug) {
            const modal = document.getElementById('legalModal');
            const body  = document.getElementById('legalModalBody');
            const title = document.getElementById('legalModalTitle');
            const titleMap = {
                'terms-of-service':     'Terms of Service',
                'privacy-policy':       'Privacy Policy',
                'investment-disclaimer':'Investment Disclaimer',
            };
            title.textContent = titleMap[slug] || 'Document';
            body.innerHTML = '<div class="legal-modal-loading">Loading…</div>';
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
            try {
                let html = __legalCache.get(slug);
                if (!html) {
                    const res = await fetch(`legal/${slug}.html`, { credentials: 'omit' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const raw = await res.text();
                    const doc = new DOMParser().parseFromString(raw, 'text/html');
                    const main = doc.querySelector('#legal-content');
                    html = main ? main.outerHTML : raw;
                    __legalCache.set(slug, html);
                }
                body.innerHTML = html;
                body.scrollTop = 0;
            } catch (err) {
                console.error('Legal modal load failed:', err);
                body.innerHTML = '<div class="legal-modal-loading" style="color:#b91c1c;">Failed to load. Please <a href="legal/' + slug + '.html" target="_blank" rel="noopener">open in a new tab</a> instead.</div>';
            }
        }
        function closeLegalModal() {
            const modal = document.getElementById('legalModal');
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }
        // Wire links + close-on-Escape + close-on-backdrop
        document.addEventListener('click', (e) => {
            const a = e.target.closest('a[data-legal]');
            if (a) { e.preventDefault(); openLegalModal(a.dataset.legal); return; }
            if (e.target && e.target.id === 'legalModal') closeLegalModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLegalModal();
        });

        // Toggle password visibility (Heroicons outline)
        const PW_ICON_EYE = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12Z"/><circle cx="12" cy="12" r="3"/></svg>';
        const PW_ICON_EYE_SLASH = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.243 4.243L9.88 9.88"/></svg>';
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = PW_ICON_EYE_SLASH;
                button.setAttribute('aria-label', 'Hide password');
                button.setAttribute('aria-pressed', 'true');
                button.setAttribute('title', 'Hide password');
            } else {
                input.type = 'password';
                button.innerHTML = PW_ICON_EYE;
                button.setAttribute('aria-label', 'Show password');
                button.setAttribute('aria-pressed', 'false');
                button.setAttribute('title', 'Show password');
            }
        }
        
        const SUPABASE_URL = 'https://wqnmxpooabmedvtackji.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxbm14cG9vYWJtZWR2dGFja2ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQwNTY3OTksImV4cCI6MjA2OTYzMjc5OX0.kiNGXtYrUoeud-rKav-o2Vs5x7BZdgG_GVF6MLWE-zs';
        
        // Initialize Supabase client
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Get customer_id and email from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const customerId = urlParams.get('customer_id');
        const email = urlParams.get('email');
        
        // Populate form
        if (customerId && email) {
            document.getElementById('customerId').value = customerId;
            document.getElementById('email').value = email;
            document.getElementById('displayEmail').value = email;
        } else {
            document.getElementById('formMessage').className = 'form-message error';
            document.getElementById('formMessage').textContent = 'Invalid registration link. Please contact support.';
            document.getElementById('submitBtn').disabled = true;
        }
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                formMessage.className = 'form-message error';
                formMessage.textContent = 'Passwords do not match.';
                return;
            }
            
            // Validate password requirements
            const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&#])[A-Za-z\d@$!%*?&#]{8,}$/;
            if (!passwordRegex.test(password)) {
                formMessage.className = 'form-message error';
                formMessage.textContent = 'Password does not meet requirements.';
                return;
            }
            
            // Check all agreements accepted
            const acceptTerms = document.getElementById('acceptTerms').checked;
            const acceptPrivacy = document.getElementById('acceptPrivacy').checked;
            const signDisclaimer = document.getElementById('signDisclaimer').checked;
            
            if (!acceptTerms || !acceptPrivacy || !signDisclaimer) {
                formMessage.className = 'form-message error';
                formMessage.textContent = 'Please accept all agreements to continue.';
                return;
            }
            
            // Disable submit
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            formMessage.className = 'form-message';
            formMessage.textContent = '';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/ef_customer_register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        customer_id: parseInt(customerId),
                        email: email,
                        password: password,
                        accept_terms: acceptTerms,
                        accept_privacy: acceptPrivacy,
                        sign_disclaimer: signDisclaimer
                    })
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    formMessage.className = 'form-message success';
                    formMessage.textContent = 'Account created successfully! Logging you in...';
                    
                    // Auto-login the user after successful registration
                    try {
                        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                            email: email,
                            password: password
                        });
                        
                        if (authError) {
                            console.error('Auto-login failed:', authError);
                            formMessage.textContent = 'Account created! Please log in manually.';
                            setTimeout(() => {
                                window.location.href = 'login.html';
                            }, 2000);
                            return;
                        }
                        
                        // Get customer registration status to determine redirect
                        const { data: customerData, error: customerError } = await supabaseClient
                            .from('customer_details')
                            .select('customer_id, registration_status')
                            .eq('customer_id', parseInt(customerId))
                            .single();
                        
                        if (customerError || !customerData) {
                            console.error('Customer lookup failed:', customerError);
                            window.location.href = 'login.html';
                            return;
                        }
                        
                        // Redirect based on registration status
                        const status = customerData.registration_status;
                        
                        if (status === 'kyc') {
                            // Need to upload ID document
                            formMessage.textContent = 'Success! Redirecting to upload your ID...';
                            setTimeout(() => {
                                window.location.href = `upload-kyc.html?customer_id=${customerData.customer_id}`;
                            }, 1500);
                        } else if (status === 'deposit' || status === 'setup' || status === 'active' || status === 'inactive') {
                            // Go to customer portal
                            formMessage.textContent = 'Success! Redirecting to your portal...';
                            setTimeout(() => {
                                window.location.href = 'customer-portal.html';
                            }, 1500);
                        } else {
                            // Default: redirect to portal
                            setTimeout(() => {
                                window.location.href = 'customer-portal.html';
                            }, 1500);
                        }
                    } catch (loginError) {
                        console.error('Auto-login error:', loginError);
                        formMessage.textContent = 'Account created! Please log in manually.';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    }
                } else {
                    formMessage.className = 'form-message error';
                    formMessage.textContent = result.error || 'Failed to create account. Please try again.';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                formMessage.className = 'form-message error';
                formMessage.textContent = 'Network error. Please check your connection and try again.';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
                console.error('Registration error:', error);
            }
        });
    </script>
</body>
</html>
