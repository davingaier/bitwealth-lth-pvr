<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - BitWealth</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: var(--bg-dark);
        }
        
        .login-card {
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            max-width: 450px;
            width: 100%;
            padding: 48px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-header p {
            color: var(--text-secondary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            background: var(--gradient-gold);
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 24px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255, 180, 0, 0.3);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .form-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .form-message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            display: block;
        }
        
        .form-message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            display: block;
        }
        
        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-link a {
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }

        /* Password reveal toggle */
        .pw-toggle {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            background: none;
            border: none;
            border-radius: 6px;
            color: #6b7280;
            cursor: pointer;
            transition: color 0.15s ease, background 0.15s ease;
        }
        .pw-toggle:hover { color: #032C48; background: #f3f4f6; }
        .pw-toggle:focus-visible { outline: 2px solid var(--gold, #C9A04A); outline-offset: 1px; }
        .pw-toggle svg { display: block; }
    </style>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/favicon-180x180.png">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>BitWealth</h1>
                <p>Customer Portal Login</p>
            </div>
            
            <div id="formMessage" class="form-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required style="padding-right: 40px;">
                        <button type="button" onclick="togglePassword('password', this)" class="pw-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="btn-login">Log In</button>
            </form>
            
            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>
    
    <script>
        // Toggle password visibility (Heroicons outline)
        const PW_ICON_EYE = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.25 12s3.75-7.5 9.75-7.5 9.75 7.5 9.75 7.5-3.75 7.5-9.75 7.5S2.25 12 2.25 12Z"/><circle cx="12" cy="12" r="3"/></svg>';
        const PW_ICON_EYE_SLASH = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.243 4.243L9.88 9.88"/></svg>';
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = PW_ICON_EYE_SLASH;
                button.setAttribute('aria-label', 'Hide password');
                button.setAttribute('aria-pressed', 'true');
                button.setAttribute('title', 'Hide password');
            } else {
                input.type = 'password';
                button.innerHTML = PW_ICON_EYE;
                button.setAttribute('aria-label', 'Show password');
                button.setAttribute('aria-pressed', 'false');
                button.setAttribute('title', 'Show password');
            }
        }
        
        const SUPABASE_URL = 'https://wqnmxpooabmedvtackji.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxbm14cG9vYWJtZWR2dGFja2ppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQwNTY3OTksImV4cCI6MjA2OTYzMjc5OX0.kiNGXtYrUoeud-rKav-o2Vs5x7BZdgG_GVF6MLWE-zs';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Preserve return URL / admin_as param through login flow
        const loginParams = new URLSearchParams(window.location.search);
        const returnTo = loginParams.get('return_to') || '';

        function portalUrl() {
          return returnTo ? returnTo : 'customer-portal.html';
        }

        // Check if already logged in
        async function checkSession() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();

                // Only proceed if we have a valid session with email
                if (session && session.user && session.user.email) {
                    // If a return_to was supplied (e.g. admin clicked the portal
                    // impersonation link), honour it immediately. The destination
                    // page does its own auth + role checks; we must not block here
                    // on a customer_details lookup because admin accounts often
                    // have no customer profile of their own.
                    if (returnTo) {
                        window.location.href = returnTo;
                        return;
                    }

                    // Find customer and redirect based on status
                    const { data: customerData, error: customerError } = await supabaseClient
                        .from('customer_details')
                        .select('customer_id, registration_status')
                        .eq('email', session.user.email)
                        .order('customer_id', { ascending: false })
                        .limit(1);
                    
                    if (!customerError && customerData && customerData.length > 0) {
                        const customer = customerData[0];
                        const status = customer.registration_status;
                        
                        if (status === 'kyc') {
                            window.location.href = `upload-kyc.html?customer_id=${customer.customer_id}`;
                        } else {
                            // Active customers go to portal
                            window.location.href = portalUrl();
                        }
                    }
                }
            } catch (error) {
                console.log('Session check error (not critical):', error);
                // Silently fail - user just stays on login page
            }
        }
        
        checkSession();
        
        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const formMessage = document.getElementById('formMessage');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            formMessage.style.display = 'none';
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    throw error;
                }

                // If a return_to was supplied (admin impersonation flow), redirect
                // straight there. The destination page handles its own auth + role
                // gating; we must not block here on a customer_details lookup
                // because admin accounts often have no customer profile.
                if (returnTo) {
                    formMessage.className = 'form-message success';
                    formMessage.style.display = 'block';
                    formMessage.textContent = 'Login successful! Redirecting...';
                    setTimeout(() => { window.location.href = returnTo; }, 500);
                    return;
                }

                // Get customer_id (use order by and limit to handle duplicates gracefully)
                const { data: customerData, error: customerError } = await supabaseClient
                    .from('customer_details')
                    .select('customer_id, registration_status')
                    .eq('email', email)
                    .order('customer_id', { ascending: false }) // Get most recent by ID
                    .limit(1);
                
                console.log('Customer lookup result:', { customerData, customerError });
                
                if (customerError || !customerData || customerData.length === 0) {
                    console.error('Customer lookup failed:', customerError);
                    throw new Error('Customer profile not found');
                }
                
                const customer = customerData[0]; // Get first result
                
                console.log('Customer status:', customer.registration_status);
                
                formMessage.className = 'form-message success';
                formMessage.textContent = 'Login successful! Redirecting...';
                
                // Redirect based on registration status
                setTimeout(() => {
                    const status = customer.registration_status;
                    
                    console.log('Redirecting based on status:', status);
                    
                    if (status === 'kyc') {
                        // Need to upload ID document
                        console.log('Redirecting to upload-kyc.html');
                        window.location.href = `upload-kyc.html?customer_id=${customer.customer_id}`;
                    } else if (status === 'active' || status === 'inactive') {
                        // Full portal access
                        console.log('Redirecting to portal (active/inactive)');
                        window.location.href = portalUrl();
                    } else if (status === 'deposit' || status === 'setup') {
                        // Show onboarding status in portal
                        console.log('Redirecting to portal (deposit/setup)');
                        window.location.href = portalUrl();
                    } else {
                        // Default: redirect to portal
                        console.log('Redirecting to portal (default)');
                        window.location.href = portalUrl();
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                formMessage.className = 'form-message error';
                formMessage.style.display = 'block'; // Override inline style
                
                if (error.message.includes('Invalid login credentials')) {
                    formMessage.textContent = 'Incorrect email address and/or password. Please contact support at support@bitwealth.co.za';
                } else if (error.message.includes('Customer profile not found')) {
                    formMessage.textContent = 'Incorrect email address and/or password. Please contact support at support@bitwealth.co.za';
                } else {
                    formMessage.textContent = 'Incorrect email address and/or password. Please contact support at support@bitwealth.co.za';
                }
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        });
    </script>
</body>
</html>
