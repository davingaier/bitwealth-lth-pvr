<!DOCTYPE html>
<html>
<head>
    <title>Session Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/favicon-180x180.png">
</head>
<body>
    <h1>Session Test</h1>
    <div id="output"></div>
    
    <script>
        const SUPABASE_URL = 'https://wqnmxpooabmedvtackji.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_8HEKObrmj01h7fd04xOl0w_7QSd89In';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function checkSession() {
            const output = document.getElementById('output');
            
            try {
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                output.innerHTML = '<h2>Session Check Results:</h2>';
                
                if (error) {
                    output.innerHTML += '<p style="color:red">Error: ' + error.message + '</p>';
                } else if (!session) {
                    output.innerHTML += '<p style="color:orange">No active session found</p>';
                    output.innerHTML += '<p>User is not logged in</p>';
                } else {
                    output.innerHTML += '<p style="color:green">✓ Session found!</p>';
                    output.innerHTML += '<pre>' + JSON.stringify(session.user, null, 2) + '</pre>';
                }
            } catch (e) {
                output.innerHTML = '<p style="color:red">Exception: ' + e.message + '</p>';
            }
        }
        
        checkSession();
    </script>
</body>
</html>
